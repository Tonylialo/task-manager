<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kuro Task Manager</title>
    <link rel="stylesheet" href="./css/index.css" />
  </head>
  <body>
    <div class="app">
      <main class="workspace" id="workspace">
        <div class="toolbar">
          <button
            class="btn view-mode-btn"
            id="viewModeBtn"
            title="List / Field"
          >
            ☰
          </button>
        </div>
        <div class="canvas" id="canvas">
          <div class="world" id="world">
            <div id="directionsLayer"></div>
          </div>
        </div>
      </main>
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-content">
          <section class="panel" id="tasksPanel">
            <div class="panel-head">
              <div class="panel-label"><span>Tasks</span></div>
            </div>
            <div class="panel-body">
              <div class="task-list" id="taskList"></div>
            </div>
          </section>
          <section class="panel" id="notificationsPanel">
            <div class="panel-head">
              <div class="panel-label"><span>Notifications</span></div>
            </div>
            <div class="panel-body">
              <div class="notification-list" id="notificationList"></div>
            </div>
          </section>
        </div>
        <div class="quick-actions">
          <button class="quick-btn">AI</button>
          <button class="quick-btn">Mail</button>
          <button class="quick-btn">TG</button>
          <button class="quick-btn">Sync</button>
        </div>
      </aside>
    </div>
    <div class="modal-backdrop" id="modalBackdrop">
      <div class="modal">
        <div class="modal-head">
          <h3 id="modalTitle">Create</h3>
          <button class="icon-btn small" id="closeModalBtn">×</button>
        </div>
        <div class="form" id="modalForm"></div>
        <div class="modal-actions" id="modalActions">
          <button class="btn danger" id="deleteBtn">Delete</button>
          <div class="modal-actions-right">
            <button class="btn" id="cancelBtn">Cancel</button>
            <button class="btn btn-primary" id="saveBtn">Save</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
